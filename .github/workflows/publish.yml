name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:ci

      # Publishes via OIDC trusted publishing — no NPM_TOKEN needed, provenance is automatic.
      # Requires a Trusted Publisher configured for this package on npmjs.com.
      - run: npm publish --access public
