openapi: 3.1.0
info:
  title: Invoice.xhub API
  description: "

    ## Overview


    The Invoice.xhub API provides REST endpoints for generating, parsing, and
    validating electronic invoices across 14 European countries.


    ## Authentication


    All endpoints require API Key authentication using a Bearer token:


    ```

    Authorization: Bearer sk_live_xxxxx

    ```


    API keys can be created in test mode (`sk_test_*`) or live mode
    (`sk_live_*`).


    ## Supported Countries


    | Country | Formats |

    |---------|---------|

    | Germany (DE) | PDF, ZUGFeRD 2.3, XRechnung 3.0 |

    | Austria (AT) | PDF, ebInterface |

    | Switzerland (CH) | PDF, QR-Bill |

    | France (FR) | PDF, Factur-X |

    | Italy (IT) | PDF, FatturaPA |

    | Spain (ES) | PDF, Facturae |

    | Netherlands (NL) | PDF, UBL |

    | Belgium (BE) | PDF, UBL |

    | Portugal (PT) | PDF |

    | Poland (PL) | PDF |

    | Czech Republic (CZ) | PDF, ISDOC |

    | Hungary (HU) | PDF, NAV |

    | Romania (RO) | PDF |

    | Bulgaria (BG) | PDF |


    ## Rate Limits & Quotas


    API usage is tracked per entitlement. When quota is exceeded, endpoints
    return HTTP 429 with quota details.


    ## Entitlements


    Access is controlled by entitlements on the API key:

    - `pdf:{country}:generate` - PDF generation

    - `e-invoice:{country}:{format}:create` - E-invoice generation

    - `e-invoice:{country}:{format}:parse` - E-invoice parsing

    \    "
  version: 1.0.0
  contact:
    name: xhub.io Support
    email: support@xhub.io
servers:
  - url: /api/v1/invoice
    description: Invoice API v1
tags:
  - name: Invoice Generation
    description: Generate invoice documents (PDF, e-invoices)
  - name: Invoice Parsing
    description: Parse e-invoice documents and extract data
  - name: Invoice Validation
    description: Validate invoice data against country rules
  - name: Formats
    description: Query supported countries and formats
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API Key authentication. Use `sk_live_*` for production or
        `sk_test_*` for testing.
security:
  - bearerAuth: []
paths:
