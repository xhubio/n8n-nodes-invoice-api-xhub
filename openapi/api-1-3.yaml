  /api/v1/invoice/{countryCode}/validate:
    post:
      operationId: postApiV1InvoiceByCountryCodeValidate
      tags:
        - Invoice Validation
      summary: Validate invoice data
      description: Validate invoice data against country-specific rules and e-invoice
        format requirements. Returns validation errors and warnings without
        consuming billing quota.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Whether the invoice is valid
                  errors:
                    description: Validation errors
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error code
                        message:
                          type: string
                          description: Error message
                        field:
                          description: Field path (if applicable)
                          type: string
                      required:
                        - code
                        - message
                  warnings:
                    description: Validation warnings
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error code
                        message:
                          type: string
                          description: Error message
                        field:
                          description: Field path (if applicable)
                          type: string
                      required:
                        - code
                        - message
                required:
                  - valid
        "400":
          description: Bad Request - Invalid invoice data or unsupported country
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                required:
                  - error
                  - message
        "401":
          description: Unauthorized - Invalid or missing API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                required:
                  - error
                  - message
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                required:
                  - error
                  - message
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice:
                  type: object
                  properties:
                    invoiceNumber:
                      type: string
                      description: Unique invoice number
                    type:
                      type: string
                      enum:
                        - invoice
                        - credit_note
                        - proforma
                        - correction
                      description: Invoice type
                    issueDate:
                      type: string
                      description: "Issue date (ISO 8601: YYYY-MM-DD)"
                    dueDate:
                      type: string
                      description: "Due date (ISO 8601: YYYY-MM-DD)"
                    deliveryDate:
                      description: Delivery date (ISO 8601)
                      type: string
                    seller:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Legal name of the party
                        street:
                          type: string
                          description: Street address
                        city:
                          type: string
                          description: City
                        postalCode:
                          type: string
                          description: Postal code
                        countryCode:
                          type: string
                          description: Country code (ISO 3166-1 alpha-2)
                        taxId:
                          description: Tax identification number
                          type: string
                        vatId:
                          description: VAT identification number
                          type: string
                        email:
                          description: Email address
                          type: string
                        phone:
                          description: Phone number
                          type: string
                      required:
                        - name
                        - street
                        - city
                        - postalCode
                        - countryCode
                      additionalProperties: {}
                      description: Seller party information
                    buyer:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Legal name of the party
                        street:
                          type: string
                          description: Street address
                        city:
                          type: string
                          description: City
                        postalCode:
                          type: string
                          description: Postal code
                        countryCode:
                          type: string
                          description: Country code (ISO 3166-1 alpha-2)
                        taxId:
                          description: Tax identification number
                          type: string
                        vatId:
                          description: VAT identification number
                          type: string
                        email:
                          description: Email address
                          type: string
                        phone:
                          description: Phone number
                          type: string
                      required:
                        - name
                        - street
                        - city
                        - postalCode
                        - countryCode
                      additionalProperties: {}
                      description: Buyer party information
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          position:
                            type: integer
                            exclusiveMinimum: 0
                            maximum: 9007199254740991
                            description: Line item position number
                          description:
                            type: string
                            description: Item description
                          articleNumber:
                            description: Article/SKU number
                            type: string
                          quantity:
                            type: number
                            exclusiveMinimum: 0
                            description: Quantity
                          unit:
                            type: string
                            description: Unit code (UN/ECE Rec 20)
                          unitPrice:
                            type: number
                            description: Unit price (net)
                          taxRate:
                            type: number
                            minimum: 0
                            maximum: 100
                            description: Tax rate in percent
                          taxCategoryCode:
                            description: Tax category code (EN 16931)
