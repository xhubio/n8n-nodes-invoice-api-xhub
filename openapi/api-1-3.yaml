                            description: Tax category code
                            type: string
                          netAmount:
                            type: number
                            description: Net amount for this tax rate
                          taxAmount:
                            type: number
                            description: Tax amount
                        required:
                          - taxRate
                          - netAmount
                          - taxAmount
                        additionalProperties: {}
                      description: Tax summary per tax rate
                    paymentTerms:
                      type: object
                      properties:
                        dueDays:
                          type: number
                          description: Payment due in days
                        description:
                          description: Payment terms description
                          type: string
                      required:
                        - dueDays
                      additionalProperties: {}
                      description: Payment terms
                    notes:
                      description: Additional notes
                      type: string
                  required:
                    - invoiceNumber
                    - type
                    - issueDate
                    - dueDate
                    - seller
                    - buyer
                    - items
                    - currency
                    - subtotal
                    - total
                    - taxSummary
                    - paymentTerms
                  additionalProperties: {}
                  description: Invoice data to validate
              required:
                - invoice
      parameters:
        - schema:
            type: string
          in: path
          name: countryCode
          required: true
  /api/v1/invoice/{countryCode}/formats:
